<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff69b4"/>
      <stop offset="100%" style="stop-color:#ff1493"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#fff0f3" stroke="url(#heartGrad)" stroke-width="3"/>
  
  <!-- Heart -->
  <path 
    d="M50 75 
       C20 55, 10 35, 25 22 
       C35 14, 45 18, 50 28 
       C55 18, 65 14, 75 22 
       C90 35, 80 55, 50 75Z" 
    fill="url(#heartGrad)" 
    filter="url(#glow)"
  />
  
  <!-- Shine on heart -->
  <ellipse cx="35" cy="32" rx="6" ry="4" fill="white" opacity="0.4" transform="rotate(-30 35 32)"/>
</svg>